<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>EZ Blaster — A Game from EZ TMS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #050a18;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: #f8f8f0;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: contain;
    touch-action: none;
  }
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at center, #1a2855 0%, #050a18 70%),
      #050a18;
  }
  .frame {
    position: relative;
    display: inline-block;
    padding: 6px;
    border: 3px solid #c8362e;
    border-radius: 6px;
    box-shadow: 0 0 60px rgba(200, 54, 46, 0.45), inset 0 0 12px rgba(0,0,0,0.7);
    background: #0a1228;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #0a1228;
    max-width: calc(100vw - 24px);
    max-height: calc(100vh - 24px);
    aspect-ratio: 480 / 640;
    width: auto; height: 90vh;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <canvas id="game" width="480" height="640"></canvas>
  </div>
</div>

// ============================================================
// PIXEL FONT (uppercase + digits + punctuation)

const FONT = {
  'A': ['.RR.','R..R','RRRR','R..R','R..R'],

};

function textWidth(text, scale) {
  text = String(text).toUpperCase();
  let w = 0;
  for (const ch of text) {
    const g = FONT[ch] || FONT[' '];
    w += g[0].length * scale + scale;
  }
  return Math.max(0, w - scale);
}

function drawText(text, x, y, color, scale = 2, align = 'left') {
  text = String(text).toUpperCase();
  let curX = x;
  if (align === 'center') curX = x - textWidth(text, scale) / 2;
  else if (align === 'right') curX = x - textWidth(text, scale);
  for (const ch of text) {
    const g = FONT[ch] || FONT[' '];
    const cw = g[0].length;
    for (let r = 0; r < g.length; r++) {
      for (let c = 0; c < cw; c++) {
        if (g[r][c] === 'R') {
          ctx.fillStyle = color;
          ctx.fillRect(Math.round(curX + c * scale), Math.round(y + r * scale), scale, scale);
        }
      }
    }
    curX += cw * scale + scale;
  }
}

// ============================================================
// AUDIO (Web Audio chiptune)
// ============================================================
let audioCtx = null;
let muted = false;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch (e) {}
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur = 0.08, type = 'square', vol = 0.06) {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}
function sweep(f1, f2, dur, type = 'square', vol = 0.06) {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  const t0 = audioCtx.currentTime;
  o.frequency.setValueAtTime(f1, t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), t0 + dur);
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(t0 + dur);
}
function noise(dur = 0.12, vol = 0.06) {
  if (muted || !audioCtx) return;
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, Math.max(1, Math.floor(sr * dur)), sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  g.gain.value = vol;
  src.buffer = buf;
  src.connect(g); g.connect(audioCtx.destination);
  src.start();
}
const SFX = {

  hit:    () => { sweep(400, 80, 0.18, 'sawtooth', 0.06); noise(0.08, 0.04); },

const ASSETS = {
  finger: null,
  cursorBasic: null,
  cursorFast: null,
  cursorTough: null,
  cursorFlash: null,
  ready: false,
};

function tintImage(img, color, mode) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  cx.drawImage(img, 0, 0);
  cx.globalCompositeOperation = mode;
  cx.fillStyle = color;
  cx.fillRect(0, 0, c.width, c.height);
  // Clip back to original alpha silhouette
  cx.globalCompositeOperation = 'destination-in';
  cx.drawImage(img, 0, 0);
  return c;
}

function loadAssets() {
  let pending = 2;
  const done = () => { if (--pending === 0) ASSETS.ready = true; };
  const fingerImg = new Image();
  fingerImg.onload = () => { ASSETS.finger = fingerImg; done(); };
  fingerImg.src = FINGER_PNG;
  const cursorImg = new Image();
  cursorImg.onload = () => {
    ASSETS.cursorBasic = cursorImg;
    ASSETS.cursorFast  = tintImage(cursorImg, '#6db6ff', 'multiply');
    ASSETS.cursorTough = tintImage(cursorImg, '#e85a52', 'multiply');
    ASSETS.cursorFlash = tintImage(cursorImg, '#ffffff', 'source-atop');
    done();
  };
  cursorImg.src = CURSOR_PNG;
}
loadAssets();

// Display sizes for art sprites (px on canvas) — in-game baseline
const ART = {
  fingerW: 88, fingerH: 97,
  cursorW: 30, cursorH: 46,
  bulletW: 12, bulletH: 24,
};

function drawArt(src, x, y, w, h) {
  if (!src) return;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(src, Math.round(x - w / 2), Math.round(y - h / 2), w, h);
  ctx.imageSmoothingEnabled = false;
}

// ============================================================
// INPUT
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  initAudio(); resumeAudio();
  if (e.code === 'KeyM') muted = !muted;
  if (e.code === 'KeyP' && state.scene === 'play') state.paused = !state.paused;
  if (e.code === 'Space') {
    if (state.scene === 'title') startGame();
    else if (state.scene === 'gameover' && state.gameoverTime > 1.5) startGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

const touch = { left: false, right: false, fire: false };
function handleTouch(e) {
  e.preventDefault();
  initAudio(); resumeAudio();
  touch.left = touch.right = touch.fire = false;
  const rect = cvs.getBoundingClientRect();
  for (const t of e.touches) {
    const tx = (t.clientX - rect.left) / rect.width * W;
    const ty = (t.clientY - rect.top) / rect.height * H;
    if (ty < H * 0.55) {
      touch.fire = true;
    } else {
      if (tx < W / 2) touch.left = true;
      else touch.right = true;
    }
  }
}
cvs.addEventListener('touchstart', e => {
  handleTouch(e);
  if (state.scene === 'title') startGame();
  else if (state.scene === 'gameover' && state.gameoverTime > 1.5) startGame();
}, { passive: false });
cvs.addEventListener('touchmove', handleTouch, { passive: false });
cvs.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) {
    touch.left = touch.right = touch.fire = false;
  } else handleTouch(e);
}, { passive: false });
cvs.addEventListener('touchcancel', e => {
  touch.left = touch.right = touch.fire = false;
}, { passive: false });

cvs.addEventListener('mousedown', () => {
  initAudio(); resumeAudio();
  if (state.scene === 'title') startGame();
  else if (state.scene === 'gameover' && state.gameoverTime > 1.5) startGame();
});

function resetPlayer() {
  state.player = {
    x: W / 2,
    y: H - 80,
    width: ART.fingerW,
    height: ART.fingerH,
    cooldown: 0,
    invuln: 0,
    powerLevel: 1,
    powerTime: 0,
  };
}

function startGame() {
  state.scene = 'play';
  state.score = 0;
  state.lives = 3;
  state.level = 1;
  state.wave = 1;
  state.bullets.length = 0;
  state.enemies.length = 0;
  state.enemyBullets.length = 0;
  state.particles.length = 0;
  state.powerups.length = 0;
  state.spawnQueue.length = 0;
  state.waveCleared = false;
  state.waveDelay = 0;
  state.combo = 0;
  state.message = 'WAVE 1';
  state.messageTime = 1.8;
  resetPlayer();
  spawnWave();
  SFX.start();
}

function gameOver() {
  if (state.score > state.highScore) state.highScore = state.score;
  state.scene = 'gameover';
  state.gameoverTime = 0;
}

// ============================================================
// WAVES
// ============================================================
function spawnWave() {
  state.spawnQueue.length = 0;
  state.waveCleared = false;
  state.waveDelay = 0;

  const level = state.level;
  const wave = state.wave;

  const cols = Math.min(8, 5 + Math.floor((level - 1) / 2));
  const rows = Math.min(4, 2 + Math.floor(wave / 2) + Math.floor((level - 1) / 3));

  const cellW = 44;
  const cellH = 36;
  const fW = cols * cellW;
  const fStartX = (W - fW) / 2 + cellW / 2;
  const fStartY = 80;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const tx = fStartX + c * cellW;
      const ty = fStartY + r * cellH;
      const fromLeft = (r % 2 === 0);
      const sx = fromLeft ? -40 : W + 40;
      const sy = -30 - (idx % 3) * 12;
      let type = 'basic';
      if (r === 0) type = 'fast';
      else if (r === rows - 1 && wave >= 2) type = 'tough';
      state.spawnQueue.push({
        delay: idx * 0.10,
        sx, sy, tx, ty, type,
        col: c, row: r,
      });
    }
  }
  SFX.wave();
}

function spawnEnemy(s) {
  state.enemies.push({
    sx: s.sx, sy: s.sy,
    x: s.sx, y: s.sy,
    tx: s.tx, ty: s.ty,
    col: s.col, row: s.row,
    type: s.type,
    mode: 'entering',
    pathT: 0,
    diveTimer: Math.max(1.5, 4 - state.level * 0.3) + Math.random() * Math.max(2.5, 8 - state.level * 0.4),
    diveProgress: 0,
    diveStartX: 0, diveStartY: 0,
    diveTargetX: 0, diveTargetY: 0,
    diveSwerve: 0,
    width: ART.cursorW,
    height: ART.cursorH,
    shootCooldown: 1.5 + Math.random() * 2,
    hp: s.type === 'tough'
        ? 2 + Math.floor((state.level - 1) / 3)   // tough: 2 (L1-3), 3 (L4-6), 4 (L7-9)...
        : (state.level >= 6 ? 2 : 1),              // basic/fast: 1, bumped to 2 at L6+
    flash: 0,
  });
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  state.time += dt;
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 30);
  if (state.messageTime > 0) state.messageTime -= dt;
  if (state.comboTimer > 0) {
    state.comboTimer -= dt;
    if (state.comboTimer <= 0) state.combo = 0;
  }

  // Stars (parallax — speed scales subtly during play)
  const starMul = state.scene === 'play' ? 1 : 0.6;
  for (const s of state.stars) {
    s.y += s.speed * dt * starMul;
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
  }

  if (state.scene === 'title') {
    updateParticles(dt);
  } else if (state.scene === 'play') {
    if (!state.paused) updatePlay(dt);
  } else if (state.scene === 'gameover') {
    state.gameoverTime += dt;
    updateParticles(dt);
    updateBullets(dt);
  }
}

function updatePlay(dt) {
  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt);
  updateEnemyBullets(dt);
  updatePowerups(dt);
  updateParticles(dt);
  updateSpawnQueue(dt);
  checkCollisions();
  checkWaveClear(dt);
}

function updatePlayer(dt) {
  const p = state.player;
  if (!p) return;

  let dx = 0;
  if (keys.ArrowLeft || keys.KeyA || touch.left) dx -= 1;
  if (keys.ArrowRight || keys.KeyD || touch.right) dx += 1;

  const speed = 300;
  p.x += dx * speed * dt;
  p.x = Math.max(p.width / 2, Math.min(W - p.width / 2, p.x));

  p.cooldown -= dt;
  if ((keys.Space || keys.KeyW || keys.ArrowUp || touch.fire) && p.cooldown <= 0) {
    fireBullet();
    p.cooldown = p.powerLevel >= 3 ? 0.16 : (p.powerLevel === 2 ? 0.19 : 0.22);
  }

  if (p.invuln > 0) p.invuln -= dt;
  if (p.powerTime > 0) {
    p.powerTime -= dt;
    if (p.powerTime <= 0) {
      p.powerLevel = 1;
      state.message = 'POWER DOWN';
      state.messageTime = 1.0;
    }
  }
}

function fireBullet() {
  const p = state.player;
  const y = p.y - p.height / 2 + 4;
  if (p.powerLevel === 1) {
    state.bullets.push({ x: p.x, y, vx: 0, vy: -540, dmg: 1 });
  } else if (p.powerLevel === 2) {
    state.bullets.push({ x: p.x - 10, y, vx: 0, vy: -540, dmg: 1 });
    state.bullets.push({ x: p.x + 10, y, vx: 0, vy: -540, dmg: 1 });
  } else {
    state.bullets.push({ x: p.x, y: y - 4, vx: 0, vy: -580, dmg: 1 });
    state.bullets.push({ x: p.x - 12, y: y + 4, vx: -110, vy: -500, dmg: 1 });
    state.bullets.push({ x: p.x + 12, y: y + 4, vx: 110, vy: -500, dmg: 1 });
  }
  SFX.shoot();
}

function updateBullets(dt) {
  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y < -10 || b.x < -10 || b.x > W + 10) state.bullets.splice(i, 1);
  }
}

function updateEnemyBullets(dt) {
  for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
    const b = state.enemyBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y > H + 10 || b.x < -20 || b.x > W + 20) state.enemyBullets.splice(i, 1);
  }
}

function updateEnemies(dt) {
  const sway = Math.sin(state.time * 1.0) * 14;

  for (const e of state.enemies) {
    if (e.flash > 0) e.flash -= dt;

    if (e.mode === 'entering') {
      e.pathT += dt * 0.7;
      const t = Math.min(1, e.pathT);
      const ease = t * t * (3 - 2 * t);
      const baseX = e.sx + (e.tx - e.sx) * ease;
      const baseY = e.sy + (e.ty - e.sy) * ease;
      const arc = Math.sin(t * Math.PI) * 60;
      e.x = baseX + (e.sx < W / 2 ? -arc : arc);
      e.y = baseY;
      if (e.pathT >= 1) {
        e.mode = 'formation';
        e.x = e.tx; e.y = e.ty;
      }
    } else if (e.mode === 'formation') {
      e.x = e.tx + sway;
      e.y = e.ty + Math.sin(state.time * 1.6 + e.col * 0.5) * 3;
      e.diveTimer -= dt;
      e.shootCooldown -= dt;
      const divers = state.enemies.filter(en => en.mode === 'diving').length;
      const maxDivers = 1 + Math.floor(state.level / 2);
      if (e.diveTimer <= 0 && divers < maxDivers) {
        startDive(e);
      }
      if (e.shootCooldown <= 0) {
        if (Math.random() < 0.018 + state.level * 0.006) shootAtPlayer(e);
        e.shootCooldown = 1.8 + Math.random() * 2;
      }
    } else if (e.mode === 'diving') {
      e.diveProgress += dt * (0.55 + state.level * 0.05);
      const t = Math.min(1, e.diveProgress);
      const baseX = e.diveStartX + (e.diveTargetX - e.diveStartX) * t;
      const baseY = e.diveStartY + (e.diveTargetY - e.diveStartY) * t;
      e.x = baseX + Math.sin(t * Math.PI * 1.6) * e.diveSwerve;
      e.y = baseY;
      e.shootCooldown -= dt;
      if (e.shootCooldown <= 0 && t > 0.15 && t < 0.7) {
        if (Math.random() < 0.05) {
          shootAtPlayer(e);
          e.shootCooldown = 0.8;
        } else {
          e.shootCooldown = 0.1;
        }
      }
      if (e.y > H + 30) {
        // Re-enter from top, snap back to formation slot
        e.mode = 'entering';
        e.sx = e.tx + (Math.random() < 0.5 ? -W * 0.35 : W * 0.35);
        e.sy = -30;
        e.x = e.sx; e.y = e.sy;
        e.pathT = 0;
        e.diveTimer = Math.max(2, 5 - state.level * 0.3) + Math.random() * Math.max(2.5, 7 - state.level * 0.35);
      }
    }
  }
}

function startDive(e) {
  e.mode = 'diving';
  e.diveStartX = e.x;
  e.diveStartY = e.y;
  const p = state.player;
  e.diveTargetX = p ? p.x + (Math.random() - 0.5) * 140 : W / 2;
  e.diveTargetY = H + 40;
  e.diveProgress = 0;
  e.diveSwerve = (Math.random() - 0.5) * 220;
  e.shootCooldown = 0.4;
}

function shootAtPlayer(e) {
  const p = state.player;
  if (!p) return;
  const dx = p.x - e.x;
  const dy = p.y - e.y;
  const len = Math.hypot(dx, dy) || 1;
  const sp = 170 + state.level * 18;
  state.enemyBullets.push({
    x: e.x, y: e.y + 8,
    vx: (dx / len) * sp,
    vy: Math.max(90, (dy / len) * sp),
  });
  SFX.click();
}

function updatePowerups(dt) {
  for (let i = state.powerups.length - 1; i >= 0; i--) {
    const p = state.powerups[i];
    p.y += 90 * dt;
    p.t = (p.t || 0) + dt;
    if (p.y > H + 20) state.powerups.splice(i, 1);
  }
}

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 220 * dt;
    p.vx *= 0.96;
    p.life -= dt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

function updateSpawnQueue(dt) {
  for (let i = state.spawnQueue.length - 1; i >= 0; i--) {
    const s = state.spawnQueue[i];
    s.delay -= dt;
    if (s.delay <= 0) {
      spawnEnemy(s);
      state.spawnQueue.splice(i, 1);
    }
  }
}

function checkCollisions() {
  const p = state.player;
  if (!p) return;

  // Player bullets -> enemies
  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    for (let j = state.enemies.length - 1; j >= 0; j--) {
      const e = state.enemies[j];
      if (e.mode === 'entering') continue;
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      if (Math.abs(dx) < e.width / 2 - 2 && Math.abs(dy) < e.height / 2 - 2) {
        state.bullets.splice(i, 1);
        e.hp -= b.dmg;
        e.flash = 0.1;
        if (e.hp <= 0) {
          killEnemy(e, j);
        } else {
          SFX.pop();
          burst(b.x, b.y, 4, C.cursorBody);
        }
        break;
      }
    }
  }

  // Enemy bullets -> player
  if (p.invuln <= 0) {
    for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
      const b = state.enemyBullets[i];
      const dx = b.x - p.x;
      const dy = b.y - (p.y + 4);
      if (Math.abs(dx) < p.width / 3 && Math.abs(dy) < p.height / 2 - 4) {
        state.enemyBullets.splice(i, 1);
        playerHit();
        return;
      }
    }
    // Enemy contact -> player
    for (let j = state.enemies.length - 1; j >= 0; j--) {
      const e = state.enemies[j];
      if (e.mode === 'entering') continue;
      const dx = e.x - p.x;
      const dy = e.y - p.y;
      if (Math.abs(dx) < (e.width + p.width) / 2 - 10 &&
          Math.abs(dy) < (e.height + p.height) / 2 - 10) {
        killEnemy(e, j);
        playerHit();
        return;
      }
    }
  }

  // Player -> powerup
  for (let i = state.powerups.length - 1; i >= 0; i--) {
    const pu = state.powerups[i];
    const dx = pu.x - p.x;
    const dy = pu.y - p.y;
    if (Math.abs(dx) < 22 && Math.abs(dy) < 28) {
      state.powerups.splice(i, 1);
      applyPowerup(pu.kind);
    }
  }
}

function killEnemy(e, idx) {
  if (idx >= 0) state.enemies.splice(idx, 1);
  let points = e.type === 'tough' ? 300 : (e.type === 'fast' ? 200 : 100);
  if (e.mode === 'diving') points *= 2;
  state.combo++;
  state.comboTimer = 1.4;
  const comboBonus = Math.min(8, state.combo);
  points *= comboBonus >= 3 ? Math.floor(comboBonus / 2) : 1;
  state.score += points;
  if (state.combo >= 5 && state.combo % 5 === 0) {
    state.message = 'COMBO X' + state.combo + '!';
    state.messageTime = 0.8;
  }
  burst(e.x, e.y, 16, C.cursorBody);
  burst(e.x, e.y, 8, C.red);
  state.shake = Math.max(state.shake, 4);
  SFX.explode();

  // Powerup drop (rare)
  if (Math.random() < 0.035) {
    const kinds = ['power', 'power', 'life'];
    const kind = kinds[Math.floor(Math.random() * kinds.length)];
    state.powerups.push({ x: e.x, y: e.y, kind, t: 0 });
  }
}

function applyPowerup(kind) {
  const p = state.player;
  if (kind === 'power') {
    p.powerLevel = Math.min(3, p.powerLevel + 1);
    p.powerTime = 14;
    state.message = p.powerLevel === 3 ? 'POWER MAX!' : 'POWER UP!';
    state.messageTime = 1.2;
  } else if (kind === 'life') {
    state.lives = Math.min(5, state.lives + 1);
    state.message = '+1 LIFE';
    state.messageTime = 1.2;
  }
  SFX.power();
}

function playerHit() {
  const p = state.player;
  state.lives--;
  state.shake = 12;
  burst(p.x, p.y, 24, C.red);
  burst(p.x, p.y, 10, C.white);
  SFX.death();
  state.combo = 0;
  if (state.lives < 0) {
    gameOver();
  } else {
    p.invuln = 2.2;
    p.x = W / 2;
    p.powerLevel = 1;
    p.powerTime = 0;
  }
}

function burst(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 50 + Math.random() * 200;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 50,
      life: 0.4 + Math.random() * 0.6,
      color,
      size: Math.random() < 0.35 ? PX * 2 : PX,
    });
  }
}

function checkWaveClear(dt) {
  if (state.enemies.length === 0 && state.spawnQueue.length === 0 && !state.waveCleared) {
    state.waveCleared = true;
    state.waveDelay = 1.6;
    state.score += 500 * state.level;
  }
  if (state.waveCleared) {
    state.waveDelay -= dt;
    if (state.waveDelay <= 0) {
      state.wave++;
      if (state.wave > 3) { state.wave = 1; state.level++; }
      state.message = state.wave === 1 ? 'LEVEL ' + state.level : 'WAVE ' + state.wave;
      state.messageTime = 1.8;
      state.waveCleared = false;
      spawnWave();
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function drawSprite(sprite, x, y, scale = PX, colorMap = KEY) {
  const w = sprite[0].length;
  const h = sprite.length;
  const x0 = Math.round(x - w * scale / 2);
  const y0 = Math.round(y - h * scale / 2);
  for (let r = 0; r < h; r++) {
    const row = sprite[r];
    for (let c = 0; c < w; c++) {
      const ch = row[c];
      const color = colorMap[ch];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x0 + c * scale, y0 + r * scale, scale, scale);
      }
    }
  }
}

function drawSpriteTint(sprite, x, y, scale, tint) {
  const w = sprite[0].length;
  const h = sprite.length;
  const x0 = Math.round(x - w * scale / 2);
  const y0 = Math.round(y - h * scale / 2);
  ctx.fillStyle = tint;
  for (let r = 0; r < h; r++) {
    const row = sprite[r];
    for (let c = 0; c < w; c++) {
      if (row[c] !== '.') {
        ctx.fillRect(x0 + c * scale, y0 + r * scale, scale, scale);
      }
    }
  }
}

function draw() {
  // Background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);
  // Subtle horizon glow
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(26,40,85,0.0)');
  grad.addColorStop(0.6, 'rgba(26,40,85,0.18)');
  grad.addColorStop(1, 'rgba(120,30,30,0.12)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of state.stars) {
    ctx.fillStyle = `rgba(170, 195, 240, ${s.brightness})`;
    ctx.fillRect(Math.round(s.x), Math.round(s.y), s.size, s.size);
  }

  ctx.save();
  if (state.shake > 0) {
    ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
  }

  if (state.scene === 'title') drawTitle();
  else if (state.scene === 'play') drawPlay();
  else if (state.scene === 'gameover') { drawPlay(); drawGameOver(); }

  ctx.restore();

  // Mute icon
  if (muted) drawText('MUTE', W - 8, H - 16, 'rgba(255,216,74,0.7)', 1.5, 'right');
}

function drawFingerWithLogo(x, y, scale = 1) {
  // The art already has the EZ logo baked in.
  if (!ASSETS.finger) return;
  const w = ART.fingerW * scale;
  const h = ART.fingerH * scale;
  drawArt(ASSETS.finger, x, y, w, h);
}

function drawTitle() {
  const t = state.time;

  // Floating cursors as background ambiance
  for (let i = 0; i < 5; i++) {
    const cx = (i / 5) * W + (W / 10) + Math.sin(t * 0.4 + i * 1.7) * 28;
    const cy = 50 + (i % 2) * 14 + Math.cos(t * 0.35 + i) * 16;
    drawArt(ASSETS.cursorBasic, cx, cy, ART.cursorW * 0.85, ART.cursorH * 0.85);
  }

  // Big foam finger (scaled up for the splash)
  const fy = 200 + Math.sin(t * 1.4) * 6;
  drawFingerWithLogo(W / 2, fy, 1.5);

  // Title — chunky red logo
  const pulse = 1 + Math.sin(t * 3) * 0.04;
  drawText('EZ BLASTER', W / 2, 340, C.red, Math.round(4 * pulse), 'center');
  drawText('CURSOR HUNTER', W / 2, 388, C.white, 2, 'center');

  // Tagline
  drawText('LESS CLICKS.', W / 2, 432, C.cream, 1.5, 'center');
  drawText('MORE BLASTS.', W / 2, 452, C.cream, 1.5, 'center');

  // Press to start
  const blink = Math.floor(t * 2) % 2 === 0;
  if (blink) drawText('PRESS SPACE OR TAP TO START', W / 2, 500, C.yellow, 2, 'center');

  // Controls
  drawText('ARROWS / A D - MOVE', W / 2, 548, C.cursorBody, 1.5, 'center');
  drawText('SPACE - BLAST', W / 2, 568, C.cursorBody, 1.5, 'center');
  drawText('M MUTE   P PAUSE', W / 2, 588, C.cursorShade, 1.5, 'center');

}

function drawPlay() {
  // Powerups
  for (const pu of state.powerups) {
    const flash = Math.floor(pu.t * 8) % 2 === 0;
    const showColor = pu.kind === 'life' ? C.red : C.yellow;
    if (flash || pu.t < 5) {
      const map = pu.kind === 'life'
        ? { '.': null, 'Y': C.red,  'C': C.white }
        : { '.': null, 'Y': C.blue, 'C': C.white };
      drawSprite(POWERUP, pu.x, pu.y, PX, map);
      drawText(pu.kind === 'life' ? '+' : 'EZ', pu.x, pu.y - 4, C.bgDark, 2, 'center');
    }
  }

  // Player bullets
  for (const b of state.bullets) drawSprite(BULLET, b.x, b.y, PX);

  // Player
  const p = state.player;
  if (p) {
    const blink = p.invuln > 0 && Math.floor(p.invuln * 14) % 2 === 0;
    if (!blink) {
      drawFingerWithLogo(p.x, p.y, 1);
    }
    if (p.powerTime > 0) {
      for (let i = 0; i < p.powerLevel; i++) {
        ctx.fillStyle = p.powerTime < 3 ? (Math.floor(state.time*8)%2 ? C.yellow : C.redDark) : C.yellow;
        ctx.fillRect(p.x - 18 + i * 14, p.y + p.height / 2 + 6, 10, 3);
      }
    }
  }

  // Enemies
  for (const e of state.enemies) {
    let src;
    if (e.flash > 0)            src = ASSETS.cursorFlash;
    else if (e.type === 'fast') src = ASSETS.cursorFast;
    else if (e.type === 'tough')src = ASSETS.cursorTough;
    else                        src = ASSETS.cursorBasic;
    drawArt(src, e.x, e.y, ART.cursorW, ART.cursorH);
  }

  // Enemy bullets
  for (const b of state.enemyBullets) {
    drawSprite(EBULLET, b.x, b.y, PX, { '.': null, 'B': C.redDark, 'G': C.red });
  }

  // Particles
  for (const pt of state.particles) {
    const alpha = Math.min(1, pt.life * 2.2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.fillRect(Math.round(pt.x), Math.round(pt.y), pt.size, pt.size);
  }
  ctx.globalAlpha = 1;

  // HUD
  drawHUD();

  // Message
  if (state.messageTime > 0) {
    const alpha = Math.min(1, state.messageTime / 0.6);
    ctx.globalAlpha = alpha;
    drawText(state.message, W / 2, H / 2 - 30, C.yellow, 4, 'center');
    ctx.globalAlpha = 1;
  }

  // Pause overlay
  if (state.paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    drawText('PAUSED', W / 2, H / 2 - 20, C.white, 5, 'center');
    drawText('PRESS P TO RESUME', W / 2, H / 2 + 40, C.cream, 2, 'center');
  }
}

function drawHUD() {
  drawText('CLICKS ELIMINATED', 12, 10, C.cream, 1, 'left');
  drawText(String(state.score).padStart(6, '0'), 12, 22, C.white, 2);

  drawText('LVL ' + state.level + ' - ' + state.wave, W / 2, 10, C.yellow, 1.5, 'center');
  if (state.combo >= 2) {
    drawText('X' + state.combo, W / 2, 32, C.redLight, 2, 'center');
  }

  drawText('LIVES', W - 12, 10, C.cream, 1.5, 'right');
  for (let i = 0; i < state.lives; i++) {
    drawArt(ASSETS.finger, W - 18 - i * 22, 46, 20, 22);
  }
}

function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.65, state.gameoverTime * 0.35)})`;
  ctx.fillRect(0, 0, W, H);
  const t = state.gameoverTime;
  if (t > 0.3) drawText('GAME OVER', W / 2, 200, C.red, 5, 'center');
  if (t > 0.8) {
    drawText('FINAL CLICKS ELIMINATED', W / 2, 290, C.cream, 1.5, 'center');
    drawText(String(state.score).padStart(6, '0'), W / 2, 315, C.white, 3, 'center');
  }
  if (t > 1.2) {
    if (state.score >= state.highScore && state.highScore > 0) {
      const blink = Math.floor(t * 4) % 2 === 0;
      if (blink) drawText('NEW HIGH SCORE!', W / 2, 370, C.yellow, 2, 'center');
    } else if (state.highScore > 0) {
      drawText('HIGH ' + String(state.highScore).padStart(6, '0'), W / 2, 370, C.cream, 1.5, 'center');
    }
    drawText('REACHED LEVEL ' + state.level, W / 2, 396, C.cursorBody, 1.5, 'center');
  }
  if (t > 2.0 && Math.floor(t * 2) % 2 === 0) {
    drawText('PRESS SPACE OR TAP TO PLAY AGAIN', W / 2, 470, C.yellow, 1.5, 'center');
  }
  if (t > 2.0) {
    drawText('READY TO LEVEL UP YOUR REAL', W / 2, 540, C.cream, 1.5, 'center');
    drawText('BROKERAGE?  EZ TMS IS WAITING', W / 2, 562, C.cream, 1.5, 'center');
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastT = performance.now();
function loop(t) {
  const dt = Math.min(1 / 30, (t - lastT) / 1000);
  lastT = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
